# FAQ — edit questions and answers here. Main app microcopy stays in copy.yaml.
# Paragraphs: separate with a blank line. Use **text** for bold. Links: [label](https://...) or [email](mailto:x@y.z)
# Block quote (indented, left border): start a paragraph with "> " (see first FAQ).
# "Feedback form" in the last item uses [text](app:feedback) to open the in-app feedback dialog; replace mailto: if needed.
en:
  items:

    - id: how_know_taste
      question: "How do you know what I’ll like?"
      answer: |
        When you rate books, we build a unique personal profile just for you. Every time you ask for a recommendation, we analyze at least 20 different "style levers" to choose and rank your top 10 books.

        > **For the Data Scientists:** Our proprietary two-stage model uses a Two-Towers retriever paired with a FiBiNET ranker to ensure high-precision matching.

    - id: same_book_again
      question: "Why do I keep seeing the same book in my recommendations?"
      answer: |
        If a book keeps popping up, it means your are more likely to love it!

        Our recommendations are **deterministic**. This means the suggestions are a reflection of your current ratings, bookmarks, and "not interested" tags. If someone else had your exact same library and ratings, they would see the same results. If you're seeing repeats, it just means that book is currently a great match, based on what we know today.

    - id: avoid_genres
      question: "Can I block specific genres or authors?"
      answer: |
        If you see a book you know you won't like, simply mark it as **‘not interested.’** This sends a strong signal to our system to filter out similar books and authors in the future.

    - id: mood_vibes
      question: "Can I search by mood or 'vibes'?"
      answer: |
        Not just yet. While we don't have a "vibe" toggle today, the ability to fine-tune your results by mood, theme, and sub-genre is at the very top of our roadmap. Stay tuned!

    - id: sell_books
      question: "Do you sell books?"
      answer: "No. We are a discovery platform dedicated to helping you find your next great read. We help you find them, whether you buy or pick them up at a library is up to you!"

    - id: change_ratings
      question: "Can I change my ratings?"
      answer: "Of course. Your taste evolves, and so should your recommendations. You can update any rating, bookmark, or ‘not interested’ tag whenever you like, and your future suggestions will update accordingly."

    - id: book_not_found
      question: "What if I can't find a specific book?"
      answer: |
        We’re sorry about that! We are currently in *beta* and our database houses about 74,000 English-language titles. While it is a lot, some might be missing. We are actively working on adding more books every day.

    - id: is_powered_by_llm
      question: "Is this app powered by an LLM (like ChatGPT)?"
      answer: |
        Actually, no. While LLMs can be great, they usually do not tailor their suggestions to your personal taste.

        We use a proprietary two-stage machine learning model specifically designed for book discovery. In our benchmarks, our model was 12 times more accurate at predicting a user's next favorite book than Gemini 3.1.

    - id: why_not_friends
      question: "Can’t I just ask my friends for suggestions?"
      answer: "You definitely should! But close friends don't always share taste in books! We’re here to fill the gap when you need a recommendation tailored to you."

    - id: import_data
      question: "Can I import my data from other sites (like Goodreads)?"
      answer: "Not yet, but we hear you! Data import is on our roadmap."

    - id: is_free
      question: "Is it free?"
      answer: "Yes, the app is free to use."

    - id: share_feedback
      question: "How can I share feedback?"
      answer: |
        We love hearing from our readers! You can help us grow by filling out our [Feedback Form](app:feedback).
