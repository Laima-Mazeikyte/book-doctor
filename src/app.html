<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="dark" />
		<!-- Bespoke: load before app CSS so @font-face is known early; preload cuts swap flash (FOUT). -->
		<link rel="stylesheet" href="/fonts/bespoke-serif/bespoke-serif.css" />
		<link
			rel="preload"
			href="/fonts/bespoke-serif/fonts/BespokeSerif-Light.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="/fonts/bespoke-serif/fonts/BespokeSerif-Regular.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="/fonts/bespoke-serif/fonts/BespokeSerif-Bold.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="/fonts/bespoke-serif/fonts/BespokeSerif-Variable.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
